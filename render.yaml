databases:
  - name: ecommerce-db
    databaseName: ecommerce
    user: ecommerce
    plan: free

services:
  - type: web
    name: ecommerce-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn ecommerce.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
