{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold text-primary">Create an Account</h2>
                
                <form method="post" class="django-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Register</button>
                    </div>
                </form>
                
                <p class="text-center mt-4 text-muted">
                    Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
