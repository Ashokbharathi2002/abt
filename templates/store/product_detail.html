{% extends 'base.html' %}

{% block content %}
<div class="card shadow-lg border-0 rounded-4 overflow-hidden mt-4">
    <div class="row g-0">
        <div class="col-md-6">
            {% if product.image_url %}
            <img src="{{ product.image_url }}" class="img-fluid w-100 h-100" alt="{{ product.name }}" style="object-fit: cover; min-height: 400px;">
            {% else %}
            <div class="bg-light d-flex align-items-center justify-content-center h-100 text-muted" style="min-height: 400px;">
                <span class="display-4">No Image</span>
            </div>
            {% endif %}
        </div>
        <div class="col-md-6">
            <div class="card-body p-5 d-flex flex-column h-100 justify-content-center">
                <div class="mb-2">
                    <span class="badge bg-secondary rounded-pill px-3 py-2">{{ product.category.name }}</span>
                </div>
                <h1 class="display-5 fw-bold mb-3">{{ product.name }}</h1>
                <h2 class="text-primary fw-bold mb-4">₹{{ product.price }}</h2>
                
                <p class="lead text-muted mb-4">{{ product.description }}</p>
                
                <div class="mb-5">
                    <div class="d-flex align-items-center text-muted">
                        <span class="me-2">📦</span> 
                        <strong>{{ product.stock }}</strong> <span class="ms-1">items available in stock</span>
                    </div>
                </div>
                
                <div class="d-grid mt-auto">
                    <a href="{% url 'add_to_cart' product.id %}" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">Add to Cart</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
